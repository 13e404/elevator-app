<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AFRAN Dashboard</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#273142;
    color:white;
}
.header{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    padding:25px;
    letter-spacing:6px;
}
.wrapper{
    display:flex;
    height:calc(100vh - 100px);
    padding:20px;
}
.sidebar{
    width:230px;
    background:#1f2735;
    border-radius:20px;
    padding:25px;
}
.sidebar a{
    display:block;
    color:#cfd8e3;
    text-decoration:none;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    transition:0.3s;
}
.sidebar a:hover{
    background:#2d3b52;
    color:#00d4ff;
}
.main{
    flex:1;
    margin-left:20px;
}
.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}
.card{
    background:#1f2735;
    padding:25px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 20px rgba(0,212,255,.2);
}
.table-box{
    margin-top:25px;
    background:#1f2735;
    border-radius:20px;
    padding:20px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    padding:14px;
    border-bottom:1px solid #334155;
    text-align:center;
}
th{
    color:#00d4ff;
}
</style>
</head>
<body>

<div class="header">AFRAN</div>

<div class="wrapper">
    <div class="sidebar">
        <a href="#">Granite</a>
        <a href="#">Mirror</a>
        <a href="#">Balloon Press</a>
        <a href="#">COP</a>
        <a href="#">LOP</a>
        <a href="#">Motor</a>
        <a href="#">Door</a>
    </div>

    <div class="main">
        <div class="cards">
            <div class="card">Granite</div>
            <div class="card">Mirror</div>
            <div class="card">Motor</div>
            <div class="card">COP</div>
            <div class="card">LOP</div>
            <div class="card">Door</div>
        </div>

        <div class="table-box">
            <table>
                <tr>
                    <th>Item</th>
                    <th>Code</th>
                    <th>Quantity</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Granite Black</td>
                    <td>GR-101</td>
                    <td>12</td>
                    <td>Available</td>
                </tr>
                <tr>
                    <td>Mirror Silver</td>
                    <td>MR-205</td>
                    <td>8</td>
                    <td>Pending</td>
                </tr>
            </table>
        </div>
    </div>
</div>

</body>
</html>
