<!DOCTYPE html>
<html>
<head>
<title>{{ category }}</title>
<style>
body{
    font-family:Arial;
    background:#273142;
    color:white;
    margin:0;
}

.container{
    padding:20px;
}

form{
    background:#1f2735;
    padding:20px;
    border-radius:15px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-bottom:20px;
}

input{
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#00d4ff;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1f2735;
    border-radius:15px;
    overflow:hidden;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #334155;
}

th{
    color:#00d4ff;
}
</style>
</head>
<body>

<div class="container">

<h2>{{ category }}</h2>

<!-- FORM -->
<form method="POST">
    <input name="project_number" placeholder="Project No">
    <input name="size" placeholder="Size">
    <input name="color" placeholder="Color">
    <input name="quantity" placeholder="Quantity">
    <button type="submit">OK</button>
</form>

<!-- TABLE -->
<table>
<tr>
    <th>Project No</th>
    <th>Size</th>
    <th>Color</th>
    <th>Quantity</th>
    <th>Date</th>
</tr>

{% for row in rows %}
<tr>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[6] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
